<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3bb6e6" id="meta-theme-color">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>복지혜택 AI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=21">
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loading-screen">
  <div class="ld-icon">🏛️</div>
  <div class="ld-title">복지혜택 AI</div>
  <div class="ld-sub">AI가 맞춤 혜택 전략을 짜드립니다</div>
  <div class="spinner" style="margin-top:8px"></div>
</div>

<!-- 앱 -->
<div id="app">

  <!-- 상단 헤더 -->
  <header class="app-header">
    <div class="app-header-logo" onclick="location.reload()">
      🏛️ 복지혜택 AI
    </div>
    <div class="header-right">
      <div id="hdr-badge" style="display:none" class="badge badge-green">분석완료</div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="라이트/다크 모드">🌙</button>
      <div class="header-avatar" onclick="navigateTo('profile')" id="hdr-avatar">👤</div>
    </div>
  </header>

  <!-- 페이지 영역 -->
  <div class="app-body" id="app-body">

    <!-- ① 위저드 (온보딩) -->
    <div class="page" id="page-wizard">
      <div class="wizard-progress-bar">
        <div class="wizard-progress-fill" id="wizard-progress" style="width:0%"></div>
      </div>
      <div class="wizard-wrap" id="wizard-wrap">
        <!-- wizard.js가 동적으로 렌더 -->
      </div>
    </div>

    <!-- ② 대시보드 (홈) -->
    <div class="page" id="page-dashboard">
      <!-- dashboard.js가 렌더 -->
    </div>

    <!-- ③ 전략보드 -->
    <div class="page" id="page-strategy">
      <!-- strategy.js가 렌더 -->
    </div>

    <!-- ④ AI 채팅 (chat.js가 통째로 렌더) -->
    <div class="page" id="page-chat"></div>

    <!-- ⑤ AI 캘린더 -->
    <div class="page" id="page-calendar">
      <!-- calendar.js가 렌더 -->
    </div>

    <!-- ⑥ 내정보 -->
    <div class="page" id="page-profile">
      <!-- profile section rendered by core.js -->
    </div>

  </div>

  <!-- 하단 내비게이션 -->
  <nav class="bottom-nav" id="bottom-nav">

    <!-- 홈 -->
    <button class="bottom-nav-item" id="nav-dashboard" onclick="navigateTo('dashboard')">
      <svg viewBox="0 0 24 24">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      홈
    </button>

    <!-- 전략보드 -->
    <button class="bottom-nav-item" id="nav-strategy" onclick="navigateTo('strategy')">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="12" width="4" height="9" rx="1"/>
        <rect x="10" y="7" width="4" height="14" rx="1"/>
        <rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
      전략보드
    </button>

    <!-- AI상담 FAB -->
    <button class="bottom-nav-item nav-fab" id="nav-chat" onclick="navigateTo('chat')">
      <div class="nav-fab-circle">
        <svg viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      AI상담
    </button>

    <!-- 캘린더 -->
    <button class="bottom-nav-item" id="nav-calendar" onclick="navigateTo('calendar')">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
        <rect x="7" y="14" width="2" height="2" rx=".5" fill="currentColor" stroke="none"/>
        <rect x="11" y="14" width="2" height="2" rx=".5" fill="currentColor" stroke="none"/>
        <rect x="15" y="14" width="2" height="2" rx=".5" fill="currentColor" stroke="none"/>
      </svg>
      캘린더
    </button>

    <!-- 내정보 -->
    <button class="bottom-nav-item" id="nav-profile" onclick="navigateTo('profile')">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      내정보
    </button>

  </nav>

</div>

<script src="core.js?v=21"></script>
<script src="wizard.js?v=21"></script>
<script src="dashboard.js?v=21"></script>
<script src="chat.js?v=21"></script>
<script src="strategy.js?v=21"></script>
<script src="calendar.js?v=21"></script>
</body>
</html>
